# Generated by `soroban-forge ci-init --provider gitlab`.
# CI/CD configuration for {{project_name}}

stages:
  - test
  - analyze
  - deploy

default:
  image: rust:latest
  before_script:
    - rustup target add wasm32v1-none

build-and-test:
  stage: test
  script:
    - cargo test
    - cargo build --target wasm32v1-none --release

contract-size:
  stage: analyze
  script:
    - cargo build --target wasm32v1-none --release
    - |
      status=0
      found=0
      MAX_WASM_KB=64
      for wasm in target/wasm32v1-none/release/*.wasm; do
        [ -e "$wasm" ] || continue
        found=1
        size_kb=$(( $(wc -c < "$wasm") / 1024 ))
        echo "$wasm: ${size_kb} KB (limit: ${MAX_WASM_KB} KB)"
        if [ "$size_kb" -gt "$MAX_WASM_KB" ]; then
          echo "contract exceeds ${MAX_WASM_KB} KB"
          status=1
        fi
      done
      if [ "$found" -eq 0 ]; then
        echo "no .wasm produced by the build"
        status=1
      fi
      exit "$status"

testnet-deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  script:
    - curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
    - export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
    - cargo build --target wasm32v1-none --release
    - |
      stellar contract deploy \
        --wasm "target/wasm32v1-none/release/{{crate_name}}.wasm" \
        --source-account "$STELLAR_DEPLOYER_SECRET" \
        --network testnet
