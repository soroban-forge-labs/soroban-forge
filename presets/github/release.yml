# Generated by `soroban-forge ci-init --release`.
#
# Tag-triggered release: builds the contract wasm, attaches it to a GitHub
# Release together with a SHA256 checksum file. Push a tag matching `v*.*.*`
# (e.g. `v0.1.0`) to trigger it.
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: "{{project_name}}: build wasm & publish release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build contract (wasm)
        run: cargo build --target wasm32v1-none --release --locked
      - name: Checksum
        run: |
          cd target/wasm32v1-none/release
          sha256sum {{crate_name}}.wasm > {{crate_name}}.wasm.sha256
      - name: Verify reproducible build
        # Clean and rebuild from the same commit; the wasm hash must match.
        # Catches non-determinism (timestamps, absolute paths, etc.) before
        # the release ships. See docs/contract-verification.md.
        run: |
          cp target/wasm32v1-none/release/{{crate_name}}.wasm /tmp/first-build.wasm
          cargo clean
          cargo build --target wasm32v1-none --release --locked
          if ! cmp -s /tmp/first-build.wasm target/wasm32v1-none/release/{{crate_name}}.wasm; then
            echo "::error::build is not reproducible: wasm differs between two builds of the same commit"
            exit 1
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wasm32v1-none/release/{{crate_name}}.wasm
            target/wasm32v1-none/release/{{crate_name}}.wasm.sha256
          generate_release_notes: true
