# Generated by `soroban-forge ci-init`.
# Fails the PR when the built contract exceeds MAX_WASM_KB.
name: contract-size

on:
  pull_request:

permissions:
  contents: read

env:
  # Maximum allowed contract size in KB.
  # TODO(verify): keep in sync with the current network limit for contract Wasm.
  MAX_WASM_KB: 64

jobs:
  contract-size:
    name: "{{project_name}}: contract size"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build contract (wasm)
        run: cargo build --target wasm32v1-none --release
      - name: Check contract size
        run: |
          status=0
          found=0
          for wasm in target/wasm32v1-none/release/*.wasm; do
            [ -e "$wasm" ] || continue
            found=1
            size_kb=$(( $(wc -c < "$wasm") / 1024 ))
            echo "$wasm: ${size_kb} KB (limit: ${MAX_WASM_KB} KB)"
            if [ "$size_kb" -gt "$MAX_WASM_KB" ]; then
              echo "::error file=$wasm::contract exceeds ${MAX_WASM_KB} KB"
              status=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::no .wasm produced by the build"
            status=1
          fi
          exit "$status"
