# Generated by `soroban-forge ci-init --deploy`.
#
# Manual (workflow_dispatch) deploys to Stellar testnet, wrapping the official
# stellar-cli. Requires a repository/environment secret named
# STELLAR_DEPLOYER_SECRET holding the secret key (S...) of a funded testnet
# account. No keys are ever stored in this file — only GitHub secret
# references. Create one at: Settings → Secrets and variables → Actions.
name: testnet-deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: "{{project_name}}: deploy to testnet"
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Install stellar-cli
        # Official installer, see:
        # https://developers.stellar.org/docs/build/smart-contracts/getting-started/setup
        # TODO(verify): pin to a stellar-cli release once the installer supports it.
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build contract
        run: cargo build --target wasm32v1-none --release
      - name: Deploy to testnet
        env:
          STELLAR_DEPLOYER_SECRET: ${{ secrets.STELLAR_DEPLOYER_SECRET }}
        run: |
          stellar contract deploy \
            --wasm "target/wasm32v1-none/release/{{crate_name}}.wasm" \
            --source-account "$STELLAR_DEPLOYER_SECRET" \
            --network testnet
