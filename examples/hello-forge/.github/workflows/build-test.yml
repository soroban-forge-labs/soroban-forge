# Generated by `soroban-forge ci-init`.
name: build-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: "hello-forge: build & test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test
      - name: Build contract (wasm)
        run: cargo build --target wasm32v1-none --release
